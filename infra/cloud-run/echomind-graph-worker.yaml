apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: echomind-graph-worker
  annotations:
    run.googleapis.com/ingress: internal-and-cloud-load-balancing
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "100"
        run.googleapis.com/concurrency: "1"
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/vpc-access-connector: "serverless-vpc-connector"
        run.googleapis.com/vpc-access-egress: "all-traffic"
        run.googleapis.com/execution-environment: "gen2"
    spec:
      containerConcurrency: 1
      timeoutSeconds: 3600
      serviceAccountName: echomind-graph-sa@echomind-prod.iam.gserviceaccount.com
      containers:
      - name: graph-worker
        image: gcr.io/echomind-prod/echomind-graph-worker:latest
        ports:
        - name: http1
          containerPort: 8080
        env:
        - name: NODE_ENV
          value: "production"
        - name: PROJECT_ID
          value: "echomind-prod"
        - name: REGION
          value: "us-central1"
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: mongodb-connection-string
              key: latest
        - name: ELASTIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: elastic-api-key
              key: latest
        resources:
          limits:
            cpu: "4"
            memory: "8Gi"
