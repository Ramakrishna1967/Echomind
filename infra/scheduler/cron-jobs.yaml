apiVersion: cloudscheduler/v1
kind: Job
metadata:
  name: oracle-6hr
spec:
  schedule: "0 */6 * * *"
  timeZone: "UTC"
  description: "Trigger Oracle prediction cycle every 6 hours"
  pubsubTarget:
    topicName: projects/echomind-prod/topics/echomind-orchestrator
    data: eyJhY3Rpb24iOiJvcnFjbGVfcHJlZGljdCJ9  # base64 {"action":"oracle_predict"}
    attributes:
      agent_type: "oracle"
      source_agent: "scheduler"
      priority: "normal"
---
