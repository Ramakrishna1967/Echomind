apiVersion: cloudscheduler/v1
kind: Job
metadata:
  name: dlq-scan-hourly
spec:
  schedule: "0 * * * *"
  timeZone: "UTC"
  description: "Scan DLQ and retry transient failures hourly"
  pubsubTarget:
    topicName: projects/echomind-prod/topics/echomind-dlq
    data: eyJhY3Rpb24iOiJzY2FuX2RscSJ9
    attributes:
      agent_type: "dlq"
      source_agent: "scheduler"
      priority: "urgent"
