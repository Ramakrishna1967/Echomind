# Secret Manager references (created via gcloud or Terraform)
# All Cloud Run services reference these by name (latest version)

secrets:
  - name: mongodb-connection-string
    replication:
      automatic: {}
    labels:
      app: echomind
      type: database
  - name: elastic-api-key
    replication:
      automatic: {}
    labels:
      app: echomind
      type: search
  - name: arize-api-key
    replication:
      automatic: {}
    labels:
      app: echomind
      type: observability
  - name: gitlab-access-token
    replication:
      automatic: {}
    labels:
      app: echomind
      type: audit
  - name: dynatrace-api-token
    replication:
      automatic: {}
    labels:
      app: echomind
      type: monitoring
  - name: firebase-config
    replication:
      automatic: {}
    labels:
      app: echomind
      type: notifications
  - name: agent-ed25519-keypair
    replication:
      automatic: {}
    labels:
      app: echomind
      type: signing
  # Per-creator OAuth (created at onboarding)
  - name: creator-{id}-youtube-oauth
  - name: creator-{id}-twitter-oauth
  - name: creator-{id}-twitch-oauth
  - name: creator-{id}-reddit-oauth
  - name: creator-{id}-discord-bot-token
  - name: creator-{id}-patreon-oauth
  - name: creator-{id}-gmail-oauth
  # KMS
  - name: echomind-master-key  # Cloud KMS CMK for CSFLE
  - name: creator-{id}-dek     # Data Encryption Key per creator
