apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeNetwork
metadata:
  name: echomind-vpc
spec:
  autoCreateSubnetworks: false
  routingMode: REGIONAL
---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeSubnetwork
metadata:
  name: echomind-subnet-us-central1
spec:
  ipCidrRange: 10.10.0.0/16
  region: us-central1
  networkRef:
    name: echomind-vpc
  privateIpGoogleAccess: true
  secondaryIpRanges:
    - rangeName: pods
      ipCidrRange: 10.20.0.0/16
    - rangeName: services
      ipCidrRange: 10.30.0.0/16
---
apiVersion: vpcaccess.cnrm.cloud.google.com/v1beta1
kind: VPCAccessConnector
metadata:
  name: serverless-vpc-connector
spec:
  region: us-central1
  networkRef:
    name: echomind-vpc
  ipCidrRange: 10.40.0.0/28
  machineType: e2-micro
  minInstances: 2
  maxInstances: 10
---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeAddress
metadata:
  name: mongodb-peering-address
spec:
  addressType: INTERNAL
  purpose: VPC_PEERING
  prefixLength: 16
  networkRef:
    name: echomind-vpc
  region: us-central1
---
apiVersion: servicenetworking.cnrm.cloud.google.com/v1beta1
kind: ServiceNetworkingConnection
metadata:
  name: mongodb-atlas-peering
spec:
  networkRef:
    name: echomind-vpc
  reservedPeeringRanges:
    - mongodb-peering-address
  service: servicenetworking.googleapis.com
