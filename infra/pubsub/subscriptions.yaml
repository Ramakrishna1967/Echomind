apiVersion: pubsub/v1
kind: Subscription
metadata:
  name: oracle-subscription
spec:
  topic: echomind-orchestrator
  ackDeadlineSeconds: 600
  messageRetentionDuration: 86400s
  filter: 'attributes.agent_type = "oracle" AND attributes.creator_id != ""'
  retryPolicy:
    minimumBackoff: 10s
    maximumBackoff: 600s
  deadLetterPolicy:
    deadLetterTopic: projects/echomind-prod/topics/echomind-dlq
    maxDeliveryAttempts: 5
  labels:
    app: echomind
    agent: oracle
---
